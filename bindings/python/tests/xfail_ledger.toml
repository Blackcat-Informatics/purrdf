#
# The purrdf rdflib-compat xfail ledger.
#
# Each key is a pytest node id; each value is a concrete reason (with an issue
# reference) for why that test is expected to fail against the current shim.
# `conftest.py` applies these as STRICT xfails: a ledgered test that starts
# passing (XPASS) fails the run — so this ledger only ever SHRINKS, never grows
# silently. Mirrors the Rust conformance harnesses' XPASS discipline (AGENTS.md §2).
#
# Add an entry ONLY with a real reason and the tracking issue, e.g.:
#   [xfail]
#   "tests/rdflib_suite/test_n3.py::test_rules" = "rdflib N3 rule syntax unsupported (#11 format breadth)"

[xfail]
"tests/test_term_model.py::test_rdf12_triple_term_has_no_rdflib_counterpart" = "RDF 1.2 triple term has no rdflib 7.6 counterpart (#11)"
"tests/test_plugin_discovery.py::test_trix_serialization_supported" = "TriX serializer is a registered-but-unsupported stub: the plugin lookup ('trix', Serializer) resolves, but there is no native TriX writer, so emitting raises NotImplementedError (#7/#11 format breadth). Ledgered so the registry slot is guaranteed while the capability is explicitly deferred."
"tests/test_plugin_discovery.py::test_hext_serialization_supported" = "HexTuples serializer is a registered-but-unsupported stub: the plugin lookup ('hext', Serializer) resolves, but there is no native HexTuples writer, so emitting raises NotImplementedError (#7/#11 format breadth). Ledgered so the slot is guaranteed while the capability is deferred."
"tests/test_namespaces.py::test_parse_binds_jsonld_context_prefixes" = "compat prefix recovery is a lightweight text scan of Turtle-family @prefix/PREFIX only; JSON-LD @context (and RDF/XML xmlns) prefixes need the native codec to surface its parsed context (#11 prefix wiring gap)"
"tests/test_query.py::test_register_custom_function_executes" = "register_custom_function records a Python callable for API parity, but the native SPARQL engine evaluates in Rust and cannot call back into an arbitrary Python function, so a call-position IRI referencing the registered function is an evaluation hard-error rather than a dispatch to the Python callable (#10 native custom-function gap)"
"tests/test_query.py::test_service_federation_matches_oracle" = "SERVICE federation has no remote query source configured in the native engine, so a SERVICE clause is an evaluation hard-error rather than a federated fetch; wiring an HTTP result source into the engine is out of scope for the drop-in (#10 SERVICE federation gap)"
"tests/test_graph_facade.py::test_parse_string_datatype_collapse_matches_oracle" = "parse() loads straight into the native store, which collapses a plain string and its explicit xsd:string sibling into one quad; the literal-variant provenance map is only populated on the add()/_add_quad boundary, so a parse-introduced collapse cannot be re-expanded to rdflib's two distinct terms without native per-term retention (#11 literal provenance residual gap)"
