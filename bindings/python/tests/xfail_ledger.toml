#
# The purrdf rdflib-compat xfail ledger.
#
# Each key is a pytest node id; each value is a concrete reason (with an issue
# reference) for why that test is expected to fail against the current shim.
# `conftest.py` applies these as STRICT xfails: a ledgered test that starts
# passing (XPASS) fails the run — so this ledger only ever SHRINKS, never grows
# silently. Mirrors the Rust conformance harnesses' XPASS discipline (AGENTS.md §2).
#
# Add an entry ONLY with a real reason and the tracking issue, e.g.:
#   [xfail]
#   "tests/rdflib_suite/test_n3.py::test_rules" = "rdflib N3 rule syntax unsupported (format breadth)"

[xfail]
"tests/test_term_model.py::test_rdf12_triple_term_has_no_rdflib_counterpart" = "RDF 1.2 triple term has no rdflib 7.6 counterpart"
"tests/test_query.py::test_register_custom_function_executes" = "register_custom_function records a Python callable for API parity, but the native SPARQL engine evaluates in Rust and cannot call back into an arbitrary Python function, so a call-position IRI referencing the registered function is an evaluation hard-error rather than a dispatch to the Python callable (native custom-function gap)"
"tests/test_query.py::test_service_federation_matches_oracle" = "SERVICE federation has no remote query source configured in the native engine, so a SERVICE clause is an evaluation hard-error rather than a federated fetch; wiring an HTTP result source into the engine is out of scope for the drop-in (SERVICE federation gap)"
"tests/test_graph_facade.py::test_parse_string_datatype_collapse_matches_oracle" = "PERMANENT FLOOR: the native interned IR stores every literal as (lexical, datatype, language) and normalizes a plain string to xsd:string, so parse() collapses a plain string and its explicit xsd:string sibling into one quad; re-expanding them would require per-term provenance retention in the native store, violating the RUST-FIRST / wasm-able interned-IR design"
