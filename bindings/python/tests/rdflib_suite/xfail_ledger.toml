#  _DatasetGraph views.)

# --- Theme: DefinedNamespace introspection ---
# (resolved: RDF is now a DefinedNamespace and DefinedNamespaceMeta.__dir__
#  returns the full term URI set.)

# --- Theme: SPARQL Result public API — .bindings / SELECT * projection ---

# --- Theme: SPARQL query prefix/namespace forwarding ---
# (resolved: Graph.query/update now prepend the graph's namespace-manager
#  bindings as PREFIX declarations, merging with initNs and skipping prefixes
#  already declared in the query text.)

# --- Theme: SPARQL aggregate / filter evaluation semantics ---
# (resolved: prefixed names with an empty namespace are now resolved against
#  the document base IRI, so `@prefix : <> . :p` expands to the same absolute
#  IRI as `PREFIX : <base>` in a query.)

# --- Theme: purrdf is stricter than rdflib (SPARQL conformance, not a purrdf gap) ---
# The upstream rdflib test source concatenates two adjacent Python string
# literals with no separating space — "SELECT ?p" "WHERE { ... }" becomes
# "SELECT ?pWHERE { ... } GROUP BY ?p" — which projects the non-group-key
# variable ?pWHERE under GROUP BY ?p. purrdf's native engine rejects this per
# SPARQL 1.1 §11.3 (a projected variable must be a group key or confined to an
# aggregate); rdflib leniently accepts it and returns ?pWHERE unbound. Vendored
# verbatim, so the upstream typo is preserved and our correct rejection ledgered.
"test_having.py::test_group_by" = "upstream test typo 'SELECT ?p' 'WHERE ...' concatenates to 'SELECT ?pWHERE ...', projecting the non-group-key variable ?pWHERE under GROUP BY; purrdf correctly rejects per SPARQL 1.1 §11.3 while rdflib leniently returns it unbound"

