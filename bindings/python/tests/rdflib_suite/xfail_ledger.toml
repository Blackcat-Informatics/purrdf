# --- Theme: SPARQL Result public API — .bindings / SELECT * projection ---
"test_evaluate_bind.py::test_bind[check-bind(\"thing\" as ?name)-name-thing]" = "compat Result exposes no .bindings attribute (rdflib's list-of-dict view of SELECT solutions), so r.bindings[0][var] raises AttributeError"
"test_evaluate_bind.py::test_bind[check-bind(<http://example.org/other> as ?other)-other-http://example.org/other]" = "compat Result exposes no .bindings attribute (rdflib's list-of-dict view of SELECT solutions), so r.bindings[0][var] raises AttributeError"
"test_evaluate_bind.py::test_bind[check-bind(:Thing as ?type)-type-http://example.org/ns#Thing]" = "compat Result exposes no .bindings attribute (rdflib's list-of-dict view of SELECT solutions), so r.bindings[0][var] raises AttributeError"
"test_optional.py::test_binding_with_optional_clause" = "compat Result exposes no .bindings attribute, so len(result.bindings) raises AttributeError on an OPTIONAL-with-subselect query"
"test_subselect.py::test_select_star_sub_select" = "'SELECT *' inside a sub-SELECT does not propagate the projected variables to the outer ResultRow, so row var lookup / asdict() raises"
"test_subselect.py::test_select_star_multiple_sub_select_star" = "'SELECT *' across multiple nested sub-SELECTs does not propagate projected variables to the outer ResultRow, so asdict() raises"
"test_subselect.py::test_select_star_multiple_sub_select_mixed_projections" = "'SELECT *' mixed with explicit projections across sub-SELECTs does not propagate all projected variables to the outer ResultRow, so asdict() raises"
"test_subselect.py::test_select_star_multiple_sub_select_defined_projections" = "explicit projections across nested sub-SELECTs are not surfaced on the outer ResultRow, so asdict() raises"

# --- Theme: SPARQL query prefix/namespace forwarding ---
# The compat facade does not forward the graph's bound namespaces into the
# native SPARQL parser as PREFIX declarations, so queries that rely on
# graph-level prefix bindings (rather than in-query PREFIX) hard-error.
"test_agg_distinct.py::test_count_optional_values" = "graph-bound prefix 'ex' is not forwarded to the native SPARQL parser, so the query fails with 'undeclared prefix ex' rather than being evaluated"

# --- Theme: SPARQL aggregate / filter evaluation semantics ---
"test_agg_distinct.py::test_count_distinct" = "COUNT(DISTINCT ?x) grouped aggregation yields an empty Result under the native engine instead of the two expected grouped counts"
"test_nested_filters.py::test_nested_filter_outer_binding_propagation" = "FILTER bindings from an outer group are not propagated into a nested group as rdflib does, so the computed solution set diverges from the expected set"
"test_conjunctive_graph.py::test_graph_ids[check-kws1]" = "ConjunctiveGraph.parse forwards a StringInputSource down a filesystem path in this keyword combination, raising FileNotFoundError instead of parsing the in-memory source"

# --- Theme: purrdf is stricter than rdflib (SPARQL conformance, not a purrdf gap) ---
# The upstream rdflib test source concatenates two adjacent Python string
# literals with no separating space — "SELECT ?p" "WHERE { ... }" becomes
# "SELECT ?pWHERE { ... } GROUP BY ?p" — which projects the non-group-key
# variable ?pWHERE under GROUP BY ?p. purrdf's native engine rejects this per
# SPARQL 1.1 §11.3 (a projected variable must be a group key or confined to an
# aggregate); rdflib leniently accepts it and returns ?pWHERE unbound. Vendored
# verbatim, so the upstream typo is preserved and our correct rejection ledgered.
"test_having.py::test_group_by" = "upstream test typo 'SELECT ?p' 'WHERE ...' concatenates to 'SELECT ?pWHERE ...', projecting the non-group-key variable ?pWHERE under GROUP BY; purrdf correctly rejects per SPARQL 1.1 §11.3 while rdflib leniently returns it unbound"

# --- Theme: ConjunctiveGraph legacy semantics ---
"test_conjunctive_graph.py::test_bnode_publicid" = "ConjunctiveGraph.parse(data=..., publicID=BNode) does not retain triples under a blank-node context the way rdflib does, so the graph reports no triples"
"test_conjunctive_graph.py::test_quad_contexts" = "iterating a ConjunctiveGraph yields 4-tuple quads, whereas rdflib's default-union iteration yields 3-tuple triples, so the flattened triple set does not match"
"test_conjunctive_graph.py::test_deprecated" = "compat ConjunctiveGraph does not emit the DeprecationWarning rdflib 7.x raises on instantiation (rdflib deprecates ConjunctiveGraph in favor of Dataset); the compat facade keeps it as a quiet alias"
