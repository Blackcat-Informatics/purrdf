#
# cbindgen configuration for libpurrdf. `cargo cbuild`
# (cargo-c) and `make capi-header` consume this to emit `purrdf.h`. The header
# IS the SemVer-frozen ABI contract: it is committed and drift-gated.
#
# REPRODUCIBILITY: the committed purrdf.h is generated by the cbindgen bundled in
# cargo-c, whose enum ordering/formatting differs between releases. Regenerate
# with the SAME cargo-c version CI pins (cargo-c@0.10.23 — see the `capi` job in
# .github/workflows/ci.yaml) or `make capi-check` will report spurious drift.

language = "C"
header = """/* SPDX-License-Identifier: MIT OR Apache-2.0 */
/* libpurrdf — the PURRDF purrdf semantic RDF-1.2 C-ABI. */
/* GENERATED by cbindgen; do not edit. Edit crates/rdf-capi and regenerate. */"""
include_guard = "PURRDF_H"
pragma_once = true
autogen_warning = "/* WARNING: generated file — edit crates/rdf-capi instead. */"
tab_width = 4
style = "type"
cpp_compat = true
documentation = true
documentation_style = "doxy"
usize_is_size_t = true

[parse]
# Only parse this crate; the opaque handles need no dependency parsing because
# they only ever cross the boundary behind pointers.
parse_deps = false

[export]
# Symbols are already prefixed purrdf_ / Purrdf; no extra prefix.
prefix = ""
# `PurrdfStatus` is only used internally (functions return `int32_t`, the status
# cast to an int), so cbindgen would not emit it — but its constants are part of
# the ABI contract, so force its inclusion.
# `PurrdfTermKind`, `PurrdfDirection`, and `PurrdfGraphMatchKind` are now stored
# as `int32_t` in the structs (to prevent enum-discriminant UB when C writes an
# out-of-range value), so cbindgen would drop them — force-export them so C
# callers retain the named constants.
include = ["PurrdfStatus", "PurrdfTermKind", "PurrdfDirection", "PurrdfGraphMatchKind"]

[enum]
# `QualifiedScreamingSnakeCase` already qualifies each variant with the enum name
# (e.g. `PURRDF_STATUS_OK`); do NOT also set `prefix_with_name` or the prefix
# doubles.
rename_variants = "QualifiedScreamingSnakeCase"

[fn]
sort_by = "None"
