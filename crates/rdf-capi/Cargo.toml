[package]
name = "purrdf-capi"
description = "PurRDF purrdf C-ABI: libpurrdf cdylib/staticlib over the purrdf semantic kernel (purrdf P8)"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
rust-version.workspace = true
readme = "README.md"
keywords = ["rdf", "rdf-12", "ffi", "c-abi", "sparql"]
publish = false

[lints]
workspace = true

[lib]
# `purrdf` â†’ libpurrdf.{so,a}. The shipped artifacts are the cdylib + staticlib;
# `rlib` is added so the in-crate integration tests (tests/abi.rs) can link the
# extern "C" symbols directly without dlopen.
name = "purrdf"
crate-type = ["staticlib", "cdylib", "rlib"]
path = "src/lib.rs"

[dependencies]
# `gts` provides the oxigraph-free GTS read/write core (gts_write +
# import_gts_events) â€” the spec's "libpurrdf statically reuses purrdf-gts so a
# language shim links one .so" clause. SPARQL is served by the native engine
# (`purrdf-sparql-eval`, below), so NO `oxigraph` feature is pulled (#906 cutover).
# The `python` feature stays OFF: this is a C-ABI, not a PyO3 extension.
# NOT workspace-inherited: renamed deps (`package = ...`) cannot be expressed
# at an inheriting use site, and the workspace key `purrdf` is the umbrella.
purrdf-rs = { package = "purrdf", path = "../purrdf", version = "0.2.0" }
# purrdf re-exports the core types, but the capi depends on the kernel
# directly too so it can name MutableDataset/QuadValues/GraphMatchValue/DatasetMut
# without leaning on re-export aliasing. Harmless to crate-check (acyclic).
purrdf-core = { workspace = true }
# The canonical SPARQL-Results serializer (purrdf S9, EPIC #906). Path-depends on
# the SAME ../rdf-core, so SparqlResult/TermValue unify â€” this crate delegates its
# SRJ emission here instead of carrying a second hand-written serializer.
purrdf-sparql-results = { workspace = true }
# The native SPARQL engine (purrdf S6, #912): the single `SparqlEngine` impl
# (`NativeSparqlEngine`) evaluates `purrdf_query` over the frozen `Arc<RdfDataset>`
# directly â€” the oxigraph-free query path (#906). Path-depends on the SAME
# ../rdf-core so `SparqlRequest`/`SparqlResult` unify.
purrdf-sparql-eval = { workspace = true }
# `xsd:dateTime`/`datetime_from_unix_seconds` for the host `QueryEnv` wall clock
# wired into the native engine below.
purrdf-xsd = { workspace = true }

# === cargo-c packaging (the spec-letter build mechanism) ===
[package.metadata.capi]
min_version = "0.10.0"

[package.metadata.capi.header]
name = "purrdf"
subdirectory = "purrdf"

[package.metadata.capi.pkg_config]
name = "purrdf"
description = "PurRDF purrdf semantic RDF-1.2 C-ABI"

[package.metadata.capi.library]
name = "purrdf"
version = "0.2.0"
