# The workspace is stable-Rust clean (no nightly features); this pin keeps
# local dev, CI, and the declared `rust-version` (MSRV) on the same channel.
[toolchain]
channel = "stable"
components = ["clippy", "rustfmt"]
targets = ["wasm32-unknown-unknown"]
