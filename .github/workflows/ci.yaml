name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  workspace:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Format
        run: cargo fmt --all --check

      - name: Check workspace
        run: cargo check --workspace --lib --tests --locked

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Enforce no Cargo features
        run: python3 scripts/check-no-features.py

      - name: Check vendored-corpus license hygiene
        run: python3 scripts/check-licenses.py

      - name: Check vendored-corpus byte-freeze
        run: python3 scripts/check-corpus-frozen.py

      - name: Check generated artifacts
        run: bash scripts/check-generated.sh

      - name: Check for stale issue references in comments/docs
        run: python3 scripts/check-issue-refs.py

      - name: Check cross-registry release coherence
        run: python3 scripts/check-versions.py

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Run workspace tests (includes doc tests)
        run: cargo test --workspace --locked

  # The C-ABI header crates/rdf-capi/include/purrdf.h is a committed,
  # SemVer-frozen contract that MUST stay a byte-exact projection of the crate's
  # exported ABI. Nothing gated it before this job existed, so it silently
  # drifted for three minor releases (missing the SHACL entry points).
  # `make capi-check` regenerates the header with the pinned cargo-c and fails on
  # any drift, then compiles + links + runs the C smoke test against it.
  capi:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install cargo-c (the pinned header-contract generator)
        # Pinned to the exact cargo-c whose bundled cbindgen the committed
        # purrdf.h contract expects (see crates/rdf-capi/cbindgen.toml). A
        # different cargo-c would emit spurious enum-ordering/formatting drift.
        run: cargo install cargo-c --version 0.10.23 --locked

      - name: Verify purrdf.h is current + the C smoke links and runs
        run: make capi-check

  doc:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      # Document exactly the 17 publishable crates with rustdoc lints promoted
      # to errors. The four publish=false crates are excluded
      # because purrdf-capi's `[lib] name = "purrdf"` collides with the umbrella
      # crate's output filename in a single --workspace doc run.
      - name: Doc (deny warnings)
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps --exclude purrdf-capi --exclude purrdf-python --exclude purrdf-sparql-conformance --exclude purrdf-cli

  msrv:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install MSRV Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.96"

      - name: Check workspace on MSRV
        run: cargo check --workspace --lib --locked

  wasm:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown

      - name: Set up the pinned wasm toolchain (wasm-bindgen + binaryen) and cache
        uses: ./.github/actions/wasm-toolchain

      - name: Check release crates on wasm32
        run: |
          cargo check --locked --target wasm32-unknown-unknown --lib \
            -p purrdf-events \
            -p purrdf-iri \
            -p purrdf-xsd \
            -p purrdf-gts \
            -p purrdf-core \
            -p purrdf-columnar \
            -p purrdf-sparql-algebra \
            -p purrdf-sparql-results \
            -p purrdf-sparql-eval \
            -p purrdf-rdf \
            -p purrdf-slice \
            -p purrdf-shapes \
            -p purrdf-shex \
            -p purrdf-entail \
            -p purrdf \
            -p purrdf-wasm

      - name: Build the optimized wasm package and gate its size
        # Builds the +simd128 release artifact, runs wasm-bindgen + wasm-opt -Oz,
        # verifies SIMD codegen, writes current-vs-budget size + toolchain
        # identity to the job summary, and HARD-FAILS if the artifact exceeds
        # WASM_SIZE_BUDGET_BYTES (raise it deliberately per the Makefile).
        run: make wasm-pkg-size

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Run npm package gates
        working-directory: crates/rdf-wasm/js
        run: |
          npm ci --ignore-scripts --no-audit --no-fund
          npm run check

  benchmarks:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    continue-on-error: true
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Compile benchmark harnesses
        run: |
          cargo bench -p purrdf-gts --no-run --locked
          cargo bench -p purrdf-core --no-run --locked
          cargo bench -p purrdf-rdf --bench native_codecs --no-run --locked
          cargo bench -p purrdf-sparql-eval --no-run --locked
          cargo bench -p purrdf-shapes --bench validate --no-run --locked
          cargo bench -p purrdf-entail --no-run --locked
          cargo bench -p purrdf-wasm --bench query_engine_reuse --no-run --locked

      - name: Run native criterion suites
        run: |
          cargo bench -p purrdf-gts --locked
          cargo bench -p purrdf-core --locked
          cargo bench -p purrdf-rdf --bench native_codecs --locked
          cargo bench -p purrdf-sparql-eval --locked
          cargo bench -p purrdf-shapes --bench validate --locked
          cargo bench -p purrdf-entail --locked
          cargo bench -p purrdf-wasm --bench query_engine_reuse --locked

      - name: Run Python compat harness
        working-directory: bindings/python
        run: |
          uv run maturin develop
          uv run python benchmarks/bench_compat.py --json bench_compat.json

      - name: Upload benchmark artifacts
        if: success() || failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: benchmark-results
          path: |
            target/criterion/
            bindings/python/bench_compat.json
          if-no-files-found: warn

  # The Python binding gate — separate from the Rust `workspace`/`test` jobs above
  # (AGENTS.md §3: `make check` stays a pure-Rust gate). Builds the native module
  # with maturin and runs the pytest suite (compat parity + the rdflib/xfail-ledger
  # gate). The REAL rdflib is installed here as the differential oracle; the
  # opt-in top-level `rdflib` shadow package is never installed in this env.
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Python binding tests (maturin build + pytest)
        working-directory: bindings/python
        run: |
          uv run maturin develop
          uv run pytest tests -q

      - name: Pydantic emitter schema oracle
        run: make pydantic-oracle

  # The single conformance matrix: runs the native Rust W3C
  # harnesses (RDFC-1.0, IRI, syntax codecs, SPARQL-eval subset, SHACL, shexTest)
  # AND the Python rdflib drop-in gate together, printing ONE scoreboard with
  # per-suite pass / xfail(skip) / fail counts. Exits non-zero on any unexpected
  # failure (a red run, an XPASS, or a stale ledger key). The matrix is also
  # published to the job summary via $GITHUB_STEP_SUMMARY. The REAL rdflib is the
  # differential oracle (installed by uv), never the top-level rdflib shadow.
  conformance:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Conformance matrix (native Rust suites + rdflib gate)
        run: make conformance
