name: Docs

on:
  pull_request:
    paths:
      - "docs/book/**"
      - ".github/workflows/docs.yaml"
  push:
    branches:
      - main

# Pinned so local (`make book`) and CI builds stay reproducible.
env:
  MDBOOK_VERSION: 0.5.3

permissions:
  contents: read

jobs:
  build:
    name: Build The PurRDF Book
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook ${{ env.MDBOOK_VERSION }}
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSfL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build book
        run: mdbook build docs/book

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book/book

  deploy:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Enables GitHub Pages for the repo on first run (build type:
          # workflow). Remove `enablement` once Pages is provisioned.
          enablement: true

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
